spring:
  application:
    name: orchestrator

  sql:
    init:
      mode: always

  datasource:
    url: jdbc:postgresql://localhost:5432/edoe
    username: edoe
    password: edoe
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: orchestrator-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080

edoe:
  orchestrator:
    step-timeout-minutes: 30
    stalled-check-interval-ms: 60000
    outbox-poll-interval-ms: 1000
    timer-poll-interval-ms: 5000
    jwt:
      secret: ${JWT_SECRET:dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS0tLS0tLS0tLS0=}

logging:
  level:
    com.edoe.orchestrator: DEBUG
    org.springframework.kafka: INFO
    alerts: ERROR
